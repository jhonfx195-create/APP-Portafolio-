<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Iteraciones</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container { 
            width: 100%;
            max-width: 350px; 
            background: #1e1e1e; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        h2 { 
            text-align: center; 
            margin-top: 0; 
            font-weight: 300;
            color: #fff;
        }

        label { 
            font-size: 0.8rem; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        input { 
            margin: 8px 0 20px 0; 
            width: 100%; 
            padding: 12px; 
            box-sizing: border-box; 
            background: #2c2c2c;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: #28a745; }

        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #28a745; 
            color: white; 
            border: none; 
            border-radius: 8px;
            cursor: pointer; 
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover { background-color: #218838; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        #resultado { 
            margin-top: 25px; 
            font-size: 0.9rem;
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #28a745;
            line-height: 1.8;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Loop Calculadora</h2>
    <label>Número 1</label>
    <input type="number" id="num1" placeholder="0">
    
    <label>Número 2</label>
    <input type="number" id="num2" placeholder="0">
    
    <button onclick="procesarOperaciones()">Ejecutar Bucle</button>

    <div id="resultado">Esperando datos...</div>
</div>

<script>
    function procesarOperaciones() {
        let n1 = parseFloat(document.getElementById('num1').value);
        let n2 = parseFloat(document.getElementById('num2').value);
        let contenedor = document.getElementById('resultado');        
        contenedor.innerHTML = "";

        if (isNaN(n1) || isNaN(n2)) {
            contenedor.innerHTML = "Por favor, ingresa ambos números.";
            return;
        }

        for (let i = 1; i <= 5; i++) {
            let operacion = "";
            let calculo = 0;

            switch (i) {
                case 1:
                    calculo = n1 + n2;
                    operacion = "Suma";
                    break;
                case 2:
                    calculo = n1 - n2;
                    operacion = "Resta";
                    break;
                case 3:
                    calculo = n1 * n2;
                    operacion = "Multiplicación";
                    break;
                case 4:
                    calculo = n2 !== 0 ? (n1 / n2).toFixed(2) : "Error (Div/0)";
                    operacion = "División";
                    break;
                case 5:
                    calculo = n1 % n2;
                    operacion = "Módulo (%)";
                    break;
                default:
                    break;
            }
            
            contenedor.innerHTML += `<strong>Iteración ${i}:</strong> ${operacion} → ${calculo} <br>`;
        }
    }
</script>

</body>
</html>
