<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Clientes</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a; 
            color: #e0e0e0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        .container {
            background-color: #1a1a1a; 
            padding: 30px;
            border-radius: 12px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        h1 {
            text-align: center;
            color: #2ecc71; 
            font-size: 1.5rem;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #2ecc71;
            font-size: 0.9rem;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            background-color: #252525;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 14px;
            color: #fff;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #2ecc71;
            background-color: #2a2a2a;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-submit {
            background-color: #2ecc71;
            color: #0a0a0a;
        }

        .btn-submit:hover {
            background-color: #27ae60;
            transform: translateY(-2px);
        }

        .btn-reset {
            background-color: transparent;
            color: #999;
            border: 1px solid #444;
        }

        .btn-reset:hover {
            background-color: #333;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Registro de Clientes</h1>
        
        <form>
            <div class="form-group">
                <label for="cedula">Cédula:</label>
                <input type="text" id="cedula" name="cedula" placeholder="Ej: 1712345678" pattern="[0-9]{10,13}" title="Ingrese solo números (10 a 13 dígitos)" required>
            </div>

            <div class="form-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre completo" minlength="3" pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ ]+$" required>
            </div>

            <div class="form-group">
                <label for="direccion">Dirección:</label>
                <textarea id="direccion" name="direccion" placeholder="Calle principal y secundaria" required></textarea>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono:</label>
                <input type="tel" id="telefono" name="telefono" placeholder="0975799791" pattern="[0-9]{7,10}" title="Ingrese un número telefónico válido" required>
            </div>

            <div class="form-group">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" name="correo" placeholder="usuario@dominio.com" required>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit">Guardar</button>
                <button type="reset" class="btn-reset">Limpiar</button>
            </div>
        </form>
    </div>
</body>
</html>
